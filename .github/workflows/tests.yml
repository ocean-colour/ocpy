name: Tests

# Continuous integration for ocpy. Runs the data-independent unit tests on
# every push and pull request. The large in situ / satellite datasets are not
# available on CI, so the data-dependent tests skip automatically.
#
# NOTE: the pre-rename ``oceancolor`` imports have all been migrated to
# ``ocpy``.  The test scope below is still intentionally limited -- the
# remaining test modules need deps not installed here (e.g. IPython) or
# have non-import issues unrelated to the rename:
#   * test_water, test_polarize, test_ls2_kd -- import chains are now
#       clean but pull in IPython (and bundled data); enable once the CI
#       dep list and data fixtures are sorted.
#   * test_ph    -- references ocpy.ph.io / load_tables, which no longer
#       exist after the ph/ module reorganization.
#   * test_ls2   -- test_ls2_run raises a numpy scalar-conversion
#       TypeError inside ls2_main.py (algorithm bug).

on:
  push:
    branches: [main, develop, pangaea]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Lightweight scientific stack needed by the clean test modules.
          # test_spectra exercises to_xarray / to_netcdf / plot, so xarray,
          # a netCDF backend (netcdf4) and matplotlib are required too.
          pip install numpy scipy pandas scikit-learn \
                      xarray netcdf4 matplotlib pytest
          # Register the package without pulling its heavy optional deps
          # (cartopy, healpy, geopandas, ...), which the CI tests do not need.
          pip install -e . --no-deps

      - name: Run unit tests
        run: |
          pytest -q \
            ocpy/tests/test_pangaea.py \
            ocpy/tests/test_spectra.py \
            ocpy/tests/test_coords.py
