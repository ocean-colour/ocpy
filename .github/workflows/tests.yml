name: Tests

# Continuous integration for ocpy. Runs the data-independent unit tests on
# every push and pull request. The large in situ / satellite datasets are not
# available on CI, so the data-dependent tests skip automatically.
#
# NOTE: the pre-rename ``oceancolor`` imports have all been migrated to
# ``ocpy``, and test_ph / test_ls2 now pass locally (the ph/io reorg and
# the numpy>=2 scalar-conversion issue in ls2_main.py are both fixed).
# The CI scope below is still intentionally limited because the remaining
# test modules (test_water, test_ph, test_polarize, test_ls2_kd, test_ls2)
# pull in IPython transitively, which is not installed in this lightweight
# job.  Add ``ipython`` to the install step (and the test files below) to
# enable them.  Separately, test_plot_oc_scene has 4 pre-existing failures
# in detect_file_type mocking, unrelated to packaging.

on:
  push:
    branches: [main, develop, pangaea]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Lightweight scientific stack needed by the clean test modules.
          # test_spectra exercises to_xarray / to_netcdf / plot, so xarray,
          # a netCDF backend (netcdf4) and matplotlib are required too.
          pip install numpy scipy pandas scikit-learn \
                      xarray netcdf4 matplotlib pytest
          # Register the package without pulling its heavy optional deps
          # (cartopy, healpy, geopandas, ...), which the CI tests do not need.
          pip install -e . --no-deps

      - name: Run unit tests
        run: |
          pytest -q \
            ocpy/tests/test_pangaea.py \
            ocpy/tests/test_spectra.py \
            ocpy/tests/test_coords.py
